[tox]
envlist=py37{,-server610},py314,pypy3


[testenv]
download = true
commands=
    py.test --instafail {posargs}
deps=
    server610: devpi-server==6.10.0
    beautifulsoup4
    pytest-cov
    pytest-instafail
    webtest


[pytest]
addopts = -ra --cov-report=term --cov-report=html
testpaths = src/devpi_constrained
markers =
    nomocking: do not mock anything in fixtures
